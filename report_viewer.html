<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Eval Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #030306;
      --surface: #0a0d12;
      --elevated: #0f141c;
      --border-dim: rgba(0, 212, 255, 0.12);
      --text: #e8f4f8;
      --muted: #6b8a9a;
      --grad: linear-gradient(105deg, #00b4ff 0%, #00e5a8 55%, #00ff88 100%);
      --grad-soft: linear-gradient(135deg, rgba(0, 180, 255, 0.15) 0%, rgba(0, 255, 136, 0.08) 100%);
      --glow-cyan: 0 0 24px rgba(0, 212, 255, 0.25);
      --glow-green: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 14px;
      color: var(--text);
      background: var(--black);
      line-height: 1.55;
    }

    /* Digital noise + grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 20%, transparent 70%);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1080px, 94vw);
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header.hero {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-dim);
      position: relative;
    }

    header.hero::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: min(420px, 60%);
      height: 2px;
      background: var(--grad);
      box-shadow: var(--glow-cyan);
    }

    .hero__tag {
      display: inline-block;
      position: relative;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding: 4px 0 4px 14px;
    }

    .hero__tag::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2px;
      bottom: 2px;
      width: 3px;
      background: var(--grad);
      border-radius: 1px;
    }

    .hero-models {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 28px;
      margin: 14px 0 16px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(0, 212, 255, 0.2);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .hero-models__item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: min(280px, 100%);
    }

    .hero-models__label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-models__val {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.25));
    }

    .hero-models__provider {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      font-size: clamp(1.35rem, 4vw, 1.85rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.35));
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .subtitle code {
      color: #7ee8c8;
      background: rgba(0, 212, 255, 0.08);
      padding: 2px 8px;
      border: 1px solid rgba(0, 255, 136, 0.2);
      clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
    }

    .panel {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      padding: 18px 20px;
      margin-bottom: 16px;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: var(--grad-soft);
      opacity: 0.5;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .panel--load {
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    .panel h2,
    .panel h3 {
      font-family: "Orbitron", sans-serif;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.95rem;
      color: #b8dce8;
      margin: 0 0 14px;
    }

    .panel h3 {
      font-size: 0.82rem;
      color: #8ab4c4;
      border-bottom: 1px solid rgba(0, 212, 255, 0.15);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--elevated);
      border: 1px solid rgba(0, 212, 255, 0.18);
      padding: 12px 14px 12px 16px;
      position: relative;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
    }

    .metric::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--grad);
      opacity: 0.85;
    }

    .metric .label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .metric .value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e8f8ff;
      text-shadow: 0 0 18px rgba(0, 212, 255, 0.2);
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      margin: 2px 4px 2px 0;
      border: 1px solid transparent;
      background: rgba(0, 0, 0, 0.4);
      clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
    }

    .passed {
      border-color: rgba(0, 255, 136, 0.55);
      color: #5cffb0;
      box-shadow: var(--glow-green);
    }

    .failed {
      border-color: rgba(0, 180, 255, 0.5);
      color: #6ed4ff;
      box-shadow: var(--glow-cyan);
    }

    .compliant {
      border-color: rgba(0, 255, 160, 0.45);
      color: #7fffd4;
    }

    .non-compliant {
      border-color: rgba(120, 100, 255, 0.5);
      color: #a8b4ff;
      box-shadow: 0 0 16px rgba(100, 140, 255, 0.2);
    }

    .sensitive {
      background: linear-gradient(90deg, rgba(0, 180, 255, 0.12), rgba(0, 255, 136, 0.12));
      border-color: rgba(0, 212, 255, 0.35);
      color: #9ee8ff;
    }

    .normal {
      border-color: rgba(0, 212, 255, 0.3);
      color: #7ec8e8;
    }

    .example {
      margin-top: 0;
      border-top: none;
      padding-top: 0;
    }

    .row {
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      padding-left: 2px;
      border-left: 2px solid rgba(0, 212, 255, 0.12);
      padding-left: 12px;
    }

    .row .k {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
      min-width: unset;
    }

    .row .v {
      color: #d4eef5;
    }

    .judge-details {
      margin-top: 4px;
      border: 1px solid rgba(0, 212, 255, 0.22);
      background: rgba(0, 0, 0, 0.35);
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .judge-details__summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8ab4c4;
      user-select: none;
    }

    .judge-details__summary::-webkit-details-marker {
      display: none;
    }

    .judge-details__chev {
      display: inline-block;
      font-size: 9px;
      color: #00e5a8;
      transition: transform 0.15s ease;
    }

    .judge-details[open] .judge-details__chev {
      transform: rotate(90deg);
    }

    .judge-details__summary:hover {
      color: #c8e8f0;
      background: rgba(0, 212, 255, 0.06);
    }

    .judge-details__body {
      padding: 0 14px 14px 32px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      color: #d4eef5;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px solid rgba(0, 212, 255, 0.12);
      margin-top: 0;
      padding-top: 12px;
    }

    .error {
      color: #c8e0ff;
      background: rgba(0, 40, 60, 0.35);
      border: 1px solid rgba(0, 212, 255, 0.35);
      padding: 16px;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
      box-shadow: inset 0 0 30px rgba(0, 255, 136, 0.06);
    }

    .error code {
      color: #7ee8c8;
      background: rgba(0, 0, 0, 0.45);
      padding: 2px 6px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    a {
      color: #5ee0ff;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 255, 136, 0.35);
    }

    a:hover {
      color: #7fffcc;
      border-bottom-color: #00ff88;
    }

    .hero-single-layout {
      width: 100%;
    }

    .hero-dual-layout {
      display: none;
      width: 100%;
    }

    .dual-hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .dual-hero-grid {
        grid-template-columns: 1fr;
      }
    }

    .dual-hero-grid .panel {
      margin-bottom: 0;
    }

    .dual-run-summary__meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin: -6px 0 12px;
    }

    .hero-judge-strip {
      margin-top: 14px;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(0, 212, 255, 0.15);
      background: rgba(0, 0, 0, 0.25);
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .dual-example-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 12px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .dual-example-cols {
        grid-template-columns: 1fr;
      }
    }

    .dual-col {
      border: 1px solid rgba(0, 212, 255, 0.15);
      background: rgba(0, 0, 0, 0.25);
      padding: 14px 16px;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .dual-col__title {
      font-family: "Orbitron", sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5ee0ff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.12);
    }

    .model-failed-tag {
      margin-left: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ff6b6b;
      text-shadow: 0 0 14px rgba(255, 80, 80, 0.5);
    }

    .hero-models__val-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 10px;
    }

    .jump-fail-btn {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffd0d0;
      background: rgba(80, 20, 30, 0.55);
      border: 1px solid rgba(255, 100, 100, 0.45);
      padding: 8px 14px;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      box-shadow: 0 0 16px rgba(255, 60, 60, 0.15);
    }

    .jump-fail-btn:hover {
      color: #fff;
      border-color: rgba(255, 140, 140, 0.75);
      background: rgba(100, 30, 40, 0.65);
    }

    .panel.example {
      scroll-margin-top: 28px;
    }

    .panel.example.example--jump-highlight {
      outline: 2px solid rgba(255, 100, 100, 0.65);
      outline-offset: 2px;
      transition: outline-color 0.2s ease;
    }

    .dataset-toolbar {
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 0;
    }

    .dataset-toolbar__btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b8f0ff;
      background: rgba(0, 40, 55, 0.55);
      border: 1px solid rgba(0, 212, 255, 0.35);
      padding: 8px 16px;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .dataset-toolbar__btn:hover {
      color: #e8ffff;
      border-color: rgba(0, 255, 200, 0.45);
      background: rgba(0, 60, 50, 0.35);
    }

    .dataset-json-panel {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid rgba(0, 212, 255, 0.2);
      max-height: min(70vh, 560px);
      overflow: auto;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }

    .dataset-json-panel[hidden] {
      display: none !important;
    }

    .dataset-json-panel__title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .dataset-json-panel pre {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      color: #c8e8f0;
    }

    .dataset-json-panel__err {
      color: #ff9a9a;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero__tag">Eval · Report</div>
      <h1>LLM Evaluation Report</h1>
      <div id="hero-single-layout" class="hero-single-layout">
        <div id="hero-models" class="hero-models" aria-live="polite">
          <div class="hero-models__item">
            <span class="hero-models__label">Target LLM</span>
            <div class="hero-models__val-wrap">
              <span id="hero-target-model" class="hero-models__val">—</span>
              <span id="hero-target-failed" class="model-failed-tag" hidden>failed</span>
            </div>
            <span id="hero-target-provider" class="hero-models__provider"></span>
          </div>
          <div class="hero-models__item">
            <span class="hero-models__label">Judge LLM</span>
            <span id="hero-judge-model" class="hero-models__val">—</span>
            <span id="hero-judge-provider" class="hero-models__provider"></span>
          </div>
        </div>
      </div>
      <div id="hero-dual-layout" class="hero-dual-layout" aria-live="polite"></div>
      <div id="hero-subtitle" class="subtitle">
        Data source: <code>eval_report.dual.json</code> if present, else <code>eval_report.json</code> (same directory as this page)
      </div>
      <div id="dataset-toolbar" class="dataset-toolbar" aria-label="Dataset shortcuts">
        <button type="button" id="btn-source-dataset" class="dataset-toolbar__btn">Source dataset</button>
        <button type="button" id="btn-failed-dataset" class="dataset-toolbar__btn">Failed prompts</button>
      </div>
      <div id="dataset-json-panel" class="dataset-json-panel" hidden>
        <div id="dataset-json-title" class="dataset-json-panel__title"></div>
        <pre id="dataset-json-pre"></pre>
      </div>
    </header>
    <div id="app" class="panel panel--load">Initializing…</div>
  </div>

  <script>
    function escapeHtml(input) {
      return String(input)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function metric(label, value) {
      return `
        <div class="metric">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function badge(text, cls) {
      return `<span class="badge ${cls}">${escapeHtml(text)}</span>`;
    }

    function rowBlock(key, innerHtml) {
      return `<div class="row"><span class="k">${escapeHtml(key)}</span><span class="v">${innerHtml}</span></div>`;
    }

    function formatLatencySeconds(valueMs) {
      if (valueMs == null || valueMs === "") return "—";
      const n = Number(valueMs);
      if (Number.isNaN(n)) return "—";
      return `${(n / 1000).toFixed(3)} s`;
    }

    function scoreToPercent(value) {
      const n = Number(value ?? 0);
      if (Number.isNaN(n)) return "0%";
      const pct = n * 100;
      return `${pct % 1 === 0 ? pct.toFixed(0) : pct.toFixed(1)}%`;
    }

    function formatTokenLine(ex) {
      if (ex.target_total_tokens != null) {
        const p = ex.target_prompt_tokens != null ? ex.target_prompt_tokens : "—";
        const c = ex.target_completion_tokens != null ? ex.target_completion_tokens : "—";
        return `${ex.target_total_tokens} total · prompt ${p} · completion ${c}`;
      }
      return "n/a (API did not return usage)";
    }

    function judgeReasonBlock(ex) {
      const reason = ex.judge_reason != null ? String(ex.judge_reason) : "";
      const body = reason ? escapeHtml(reason) : "<span class=\"v\">—</span>";
      return `
        <div class="row judge-reason-row">
          <span class="k">Judge reason</span>
          <details class="judge-details">
            <summary class="judge-details__summary">
              <span class="judge-details__chev" aria-hidden="true">▶</span>
              <span>Expand / collapse reasoning</span>
            </summary>
            <div class="judge-details__body">${body}</div>
          </details>
        </div>
      `;
    }

    function formatAggLatency(data) {
      let sec = data.avg_target_latency_s;
      if (sec == null && data.avg_target_latency_ms != null) {
        sec = Number(data.avg_target_latency_ms) / 1000;
      }
      if (sec == null || sec === "") return "—";
      return `${Number(sec).toFixed(3)} s (mean)`;
    }

    function formatAggTokens(data) {
      const sum = data.sum_target_tokens;
      const avg = data.avg_target_tokens_per_example;
      if (sum == null) return "—";
      const avgPart = avg != null ? ` · ${Number(avg).toFixed(1)} / example` : "";
      return `${sum} total${avgPart}`;
    }

    function setHeroModels(data) {
      const targetEl = document.getElementById("hero-target-model");
      const judgeEl = document.getElementById("hero-judge-model");
      const tpEl = document.getElementById("hero-target-provider");
      const jpEl = document.getElementById("hero-judge-provider");
      const failSpan = document.getElementById("hero-target-failed");
      if (!targetEl || !judgeEl) return;

      const tm = data && data.target_model != null && String(data.target_model).trim() !== ""
        ? String(data.target_model)
        : "—";
      const jm = data && data.judge_model != null && String(data.judge_model).trim() !== ""
        ? String(data.judge_model)
        : "—";

      targetEl.textContent = tm;
      judgeEl.textContent = jm;

      if (failSpan) {
        const showFailed = Boolean(data && data.status && String(data.status).toLowerCase() !== "passed");
        failSpan.hidden = !showFailed;
      }

      if (tpEl) {
        const p = data && data.target_provider ? String(data.target_provider) : "";
        tpEl.textContent = p ? `Provider · ${p}` : "";
      }
      if (jpEl) {
        const p = data && data.judge_provider ? String(data.judge_provider) : "";
        jpEl.textContent = p ? `Provider · ${p}` : "";
      }
    }

    function resetDualHeroLayout() {
      const dualLayout = document.getElementById("hero-dual-layout");
      const singleLayout = document.getElementById("hero-single-layout");
      if (dualLayout) {
        dualLayout.innerHTML = "";
        dualLayout.style.display = "none";
      }
      if (singleLayout) singleLayout.style.display = "";
    }

    function jumpFailButtonHtml(failedExampleIndex) {
      if (failedExampleIndex == null || failedExampleIndex === "") return "";
      const n = Number(failedExampleIndex);
      if (Number.isNaN(n)) return "";
      const id = `example-${n}`;
      return `<button type="button" class="jump-fail-btn" data-scroll-to="${escapeHtml(id)}">Go to failed prompt</button>`;
    }

    function renderRunSummaryPanel(run, title) {
      const r = run || {};
      const passed = String(r.status || "").toLowerCase() === "passed";
      const statusBadge = passed
        ? badge("PASSED", "passed")
        : badge("FAILED", "failed");
      const metaParts = [r.target_model, r.target_provider].filter((x) => x != null && String(x).trim() !== "");
      const failedTag = !passed ? `<span class="model-failed-tag">failed</span>` : "";
      const metaLine = metaParts.length
        ? `<div class="dual-run-summary__meta">${escapeHtml(metaParts.join(" · "))}${failedTag}</div>`
        : (!passed ? `<div class="dual-run-summary__meta">${failedTag}</div>` : "");
      const jumpBtn = !passed ? jumpFailButtonHtml(r.failed_example_index) : "";
      return `
        <div class="panel dual-run-summary">
          <h2>${escapeHtml(title)} ${statusBadge}</h2>
          ${metaLine}
          <div class="grid">
            ${metric("Average score", scoreToPercent(r.average_score))}
            ${metric("Evaluated", `${r.evaluated_count ?? 0} / ${r.total_count ?? 0}`)}
            ${metric("Avg target latency", formatAggLatency(r))}
            ${metric("Target tokens", formatAggTokens(r))}
            ${metric("Fail Reason", r.fail_reason || "None")}
            ${metric("Failed Index", String(r.failed_example_index ?? "None"))}
          </div>
          ${jumpBtn}
        </div>
      `;
    }

    function buildDualHero(data) {
      const labels = data.run_labels || ["Model A", "Model B"];
      const runs = data.runs || [];
      const jm = data.judge_model != null ? String(data.judge_model) : "—";
      const jp = data.judge_provider != null ? String(data.judge_provider) : "";
      const judgeLine = jp ? `${jm} · ${jp}` : jm;
      return `
        <div class="dual-hero-grid">
          ${renderRunSummaryPanel(runs[0], labels[0] || "Model A")}
          ${renderRunSummaryPanel(runs[1], labels[1] || "Model B")}
        </div>
        <div class="hero-judge-strip">Judge · ${escapeHtml(judgeLine)}</div>
      `;
    }

    function renderSummaryGrid(data) {
      const passed = String(data.status || "").toLowerCase() === "passed";
      const statusBadge = passed
        ? badge("PASSED", "passed")
        : badge("FAILED", "failed");
      const jumpBtn = !passed ? jumpFailButtonHtml(data.failed_example_index) : "";
      return `
        <div class="panel">
          <h2>Summary ${statusBadge}</h2>
          <div class="grid">
            ${metric("Average score", scoreToPercent(data.average_score))}
            ${metric("Evaluated", `${data.evaluated_count ?? 0} / ${data.total_count ?? 0}`)}
            ${metric("Avg target latency", formatAggLatency(data))}
            ${metric("Target tokens", formatAggTokens(data))}
            ${metric("Fail Reason", data.fail_reason || "None")}
            ${metric("Failed Index", String(data.failed_example_index ?? "None"))}
          </div>
          ${jumpBtn}
        </div>
      `;
    }

    function renderSingleExamples(data) {
      return (data.examples || []).map((ex) => {
        const comp = ex.judge_compliant
          ? badge("Compliant", "compliant")
          : badge("Non-compliant", "non-compliant");
        const sensitivity = ex.is_sensitive
          ? badge("Sensitive", "sensitive")
          : badge("Normal", "normal");

        return `
          <div id="example-${escapeHtml(String(ex.index))}" class="panel example">
            <h3>Example #${escapeHtml(ex.index)}</h3>
            ${rowBlock("Status", `${comp} ${sensitivity}`)}
            ${rowBlock("Score", escapeHtml(scoreToPercent(ex.judge_score)))}
            ${rowBlock("Category", escapeHtml(ex.category ?? ""))}
            ${rowBlock("Prompt", escapeHtml(ex.prompt ?? ""))}
            ${rowBlock("Expected", escapeHtml(ex.expected_answer ?? ""))}
            ${rowBlock("Target Output", escapeHtml(ex.target_output ?? ""))}
            ${rowBlock("Target latency", escapeHtml(formatLatencySeconds(ex.target_latency_ms)))}
            ${rowBlock("Target tokens", escapeHtml(formatTokenLine(ex)))}
            ${judgeReasonBlock(ex)}
          </div>
        `;
      }).join("");
    }

    function renderReport(data) {
      const examples = renderSingleExamples(data);
      return renderSummaryGrid(data) + (examples || "<div class='panel'>No examples found.</div>");
    }

    function renderOneModelColumn(slice, label) {
      const s = slice || {};
      const comp = s.judge_compliant
        ? badge("Compliant", "compliant")
        : badge("Non-compliant", "non-compliant");
      const sensitivity = s.is_sensitive
        ? badge("Sensitive", "sensitive")
        : badge("Normal", "normal");
      return `
        <div class="dual-col">
          <div class="dual-col__title">${escapeHtml(label)}</div>
          ${rowBlock("Status", `${comp} ${sensitivity}`)}
          ${rowBlock("Score", escapeHtml(scoreToPercent(s.judge_score)))}
          ${rowBlock("Target Output", escapeHtml(s.target_output ?? ""))}
          ${rowBlock("Target latency", escapeHtml(formatLatencySeconds(s.target_latency_ms)))}
          ${rowBlock("Target tokens", escapeHtml(formatTokenLine(s)))}
          ${judgeReasonBlock(s)}
        </div>
      `;
    }

    function renderDualExamples(data) {
      const labels = data.run_labels || ["Model A", "Model B"];
      const rows = (data.examples || []).map((ex) => {
        const per = ex.per_model || [];
        const left = renderOneModelColumn(per[0], labels[0] || "Model A");
        const right = renderOneModelColumn(per[1], labels[1] || "Model B");
        return `
          <div id="example-${escapeHtml(String(ex.index))}" class="panel example">
            <h3>Example #${escapeHtml(ex.index)}</h3>
            ${rowBlock("Category", escapeHtml(ex.category ?? ""))}
            ${rowBlock("Prompt", escapeHtml(ex.prompt ?? ""))}
            ${rowBlock("Expected", escapeHtml(ex.expected_answer ?? ""))}
            <div class="dual-example-cols">${left}${right}</div>
          </div>
        `;
      }).join("");
      return rows || "<div class='panel'>No examples found.</div>";
    }

    function isDualReport(data) {
      return data && data.format === "dual" && Array.isArray(data.runs) && data.runs.length >= 2;
    }

    function wireJumpFailButtonsOnce() {
      if (wireJumpFailButtonsOnce._done) return;
      wireJumpFailButtonsOnce._done = true;
      document.body.addEventListener("click", (ev) => {
        const btn = ev.target.closest(".jump-fail-btn");
        if (!btn) return;
        const id = btn.getAttribute("data-scroll-to");
        if (!id) return;
        const el = document.getElementById(id);
        if (!el) return;
        document.querySelectorAll(".example--jump-highlight").forEach((n) => {
          n.classList.remove("example--jump-highlight");
        });
        el.classList.add("example--jump-highlight");
        el.scrollIntoView({ behavior: "smooth", block: "start" });
        window.setTimeout(() => {
          el.classList.remove("example--jump-highlight");
        }, 2600);
      });
    }

    const DEFAULT_SOURCE_DATASET = "dataset.sample.json";
    const DEFAULT_FAILED_PROMPTS = "failed_prompts.json";

    /** Set by successful report load; used by dataset toolbar fetches. */
    let evalReportDatasetPaths = {
      source: DEFAULT_SOURCE_DATASET,
      failed: DEFAULT_FAILED_PROMPTS,
    };

    let datasetViewerActiveKind = null;

    function hideDatasetJsonPanel() {
      const panel = document.getElementById("dataset-json-panel");
      if (panel) panel.hidden = true;
      datasetViewerActiveKind = null;
    }

    function showDatasetJsonLoading(title, relPath) {
      const panel = document.getElementById("dataset-json-panel");
      const titleEl = document.getElementById("dataset-json-title");
      const pre = document.getElementById("dataset-json-pre");
      if (titleEl) titleEl.textContent = `${title} (${relPath})`;
      if (pre) pre.textContent = "Loading…";
      if (panel) panel.hidden = false;
    }

    function showDatasetJsonContent(title, relPath, payload) {
      const panel = document.getElementById("dataset-json-panel");
      const titleEl = document.getElementById("dataset-json-title");
      const pre = document.getElementById("dataset-json-pre");
      if (titleEl) titleEl.textContent = `${title} (${relPath})`;
      if (pre) pre.textContent = JSON.stringify(payload, null, 2);
      if (panel) panel.hidden = false;
    }

    function showDatasetJsonFetchError(title, relPath, status, message) {
      const panel = document.getElementById("dataset-json-panel");
      const titleEl = document.getElementById("dataset-json-title");
      const pre = document.getElementById("dataset-json-pre");
      if (titleEl) titleEl.textContent = `${title} (${relPath})`;
      const msg = message != null && message !== "" ? String(message) : "Request failed";
      const detail =
        status != null
          ? `HTTP ${status}: ${escapeHtml(msg)}`
          : escapeHtml(msg);
      if (pre) pre.innerHTML = `<span class="dataset-json-panel__err">${detail}</span>`;
      if (panel) panel.hidden = false;
    }

    function setDatasetPathsFromReport(data) {
      evalReportDatasetPaths = {
        source: (data && data.source_dataset) || DEFAULT_SOURCE_DATASET,
        failed: (data && data.failed_prompts_dataset) || DEFAULT_FAILED_PROMPTS,
      };
      const tb = document.getElementById("dataset-toolbar");
      if (tb) tb.style.display = "flex";
    }

    function resetDatasetToolbar() {
      evalReportDatasetPaths = {
        source: DEFAULT_SOURCE_DATASET,
        failed: DEFAULT_FAILED_PROMPTS,
      };
      const tb = document.getElementById("dataset-toolbar");
      if (tb) tb.style.display = "none";
      hideDatasetJsonPanel();
    }

    function wireDatasetViewerOnce() {
      if (wireDatasetViewerOnce._done) return;
      wireDatasetViewerOnce._done = true;
      document.body.addEventListener("click", async (ev) => {
        const srcBtn = ev.target.closest("#btn-source-dataset");
        const failBtn = ev.target.closest("#btn-failed-dataset");
        if (!srcBtn && !failBtn) return;
        ev.preventDefault();
        const kind = srcBtn ? "source" : "failed";
        const relPath =
          kind === "source"
            ? evalReportDatasetPaths.source
            : evalReportDatasetPaths.failed;
        const title = kind === "source" ? "Source dataset" : "Failed prompts";
        const panel = document.getElementById("dataset-json-panel");
        if (datasetViewerActiveKind === kind && panel && !panel.hidden) {
          hideDatasetJsonPanel();
          return;
        }
        datasetViewerActiveKind = kind;
        const url = new URL(relPath, window.location.href).href;
        showDatasetJsonLoading(title, relPath);
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) {
            showDatasetJsonFetchError(title, relPath, res.status, res.statusText);
            return;
          }
          const payload = await res.json();
          showDatasetJsonContent(title, relPath, payload);
        } catch (e) {
          showDatasetJsonFetchError(title, relPath, null, e.message || String(e));
        }
      });
    }

    async function load() {
      const app = document.getElementById("app");
      const dualLayout = document.getElementById("hero-dual-layout");
      const singleLayout = document.getElementById("hero-single-layout");

      try {
        let data = null;
        let sourceFile = "eval_report.json";

        const resDual = await fetch("./eval_report.dual.json", { cache: "no-store" });
        if (resDual.ok) {
          const candidate = await resDual.json();
          if (isDualReport(candidate)) {
            data = candidate;
            sourceFile = "eval_report.dual.json";
          }
        }

        if (!data) {
          const resSingle = await fetch("./eval_report.json", { cache: "no-store" });
          if (!resSingle.ok) {
            throw new Error(
              `Could not load eval_report.dual.json (HTTP ${resDual.status}) or eval_report.json (HTTP ${resSingle.status}).`
            );
          }
          data = await resSingle.json();
          sourceFile = "eval_report.json";
        }

        app.classList.remove("panel--load");

        const subEl = document.getElementById("hero-subtitle");
        if (subEl) {
          subEl.innerHTML = `Loaded <code>${escapeHtml(sourceFile)}</code> (same directory as this page)`;
        }

        setDatasetPathsFromReport(data);

        if (isDualReport(data)) {
          if (singleLayout) singleLayout.style.display = "none";
          if (dualLayout) {
            dualLayout.style.display = "block";
            dualLayout.innerHTML = buildDualHero(data);
          }
          setHeroModels(null);
          app.innerHTML = renderDualExamples(data);
        } else {
          resetDualHeroLayout();
          setHeroModels(data);
          app.innerHTML = renderReport(data);
        }
      } catch (err) {
        resetDatasetToolbar();
        resetDualHeroLayout();
        setHeroModels(null);
        app.classList.remove("panel--load");
        app.innerHTML = `
          <div class="error">
            Could not load <code>eval_report.dual.json</code> or <code>eval_report.json</code>.<br/>
            Start a local server in this folder, then open this page via <code>http://localhost:8000/report_viewer.html</code>.<br/><br/>
            Error: ${escapeHtml(err.message)}
          </div>
        `;
      }
    }

    wireJumpFailButtonsOnce();
    wireDatasetViewerOnce();
    load();
  </script>
</body>
</html>
