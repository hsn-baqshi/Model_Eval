name: Build and Deploy Eval Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JUDGE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MAX_RETRIES: "12"
          LLM_RETRY_DELAY_SECONDS: "6"
          LLM_MAX_RETRY_DELAY_SECONDS: "120"
        run: |
          python llm_eval_framework.py \
            --dataset dataset.sample.json \
            --outputs model_a_outputs.json \
            --report eval_report.json \
            --target-provider gemini \
            --judge-provider gemini \
            --target-model gemini-2.5-flash \
            --judge-model gemini-2.5-flash

      - name: Prepare Pages artifact
        run: |
          mkdir site
          cp report_viewer.html site/
          cp eval_report.json site/
          cp model_a_outputs.json site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
